    function App() {
      const [theme, setTheme] = useState('light');
      const [products, setProducts] = useState(defaultProducts);
      const [cartItems, setCartItems] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [isTrackOpen, setIsTrackOpen] = useState(false);
      const [trackInput, setTrackInput] = useState('');
      const [trackedOrder, setTrackedOrder] = useState(null);
      const [toasts, setToasts] = useState([]);

      const addToast = (message, icon = '✨') => {
        const id = Date.now();
        setToasts((prev) => [...prev, { id, message, icon }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter(t => t.id !== id));
        }, 2500);
      };

      const [currentUser, setCurrentUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem('fm_user')); } catch { return null; }
      });
      const [isAuthOpen, setIsAuthOpen] = useState(false);
      const [isAccountOpen, setIsAccountOpen] = useState(false);
      const [isCustomCoverOpen, setIsCustomCoverOpen] = useState(false);
      const [isCustomFrameOpen, setIsCustomFrameOpen] = useState(false);
      const [customCoverForm, setCustomCoverForm] = useState({ brand: 'Apple', model: 'iPhone 15 Pro', type: 'Full 3D Hard Case', finish: 'Matte Finish', text: '', photo: null });
      const [customFrameForm, setCustomFrameForm] = useState({ size: '6 x 8 inches', color: 'Classic Walnut Wood', orientation: 'Portrait', glass: 'Anti-Glare Glass', photo: null });
      const [authTab, setAuthTab] = useState('login');
      const [authIdentity, setAuthIdentity] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [signupData, setSignupData] = useState({ name: '', phone: '', email: '', address: 'Madurai, Tamil Nadu', password: '' });
      const [userOrders, setUserOrders] = useState([]);
      const [forgotPhone, setForgotPhone] = useState('');
      const [forgotStep, setForgotStep] = useState(1);
      const [verifiedName, setVerifiedName] = useState('');
      const [newPassword, setNewPassword] = useState('');

      useEffect(() => {
        if (currentUser) {
          localStorage.setItem('fm_user', JSON.stringify(currentUser));
          setCustomer({ name: currentUser.name || '', phone: currentUser.phone || '', address: currentUser.address || '' });
        } else {
          localStorage.removeItem('fm_user');
        }
      }, [currentUser]);

      const fetchMyOrders = async () => {
        if (!currentUser) return;
        try {
          const res = await fetch(`${API_BASE}/orders/user/${currentUser.phone || currentUser.email}`);
          const data = await res.json();
          if (data.success) setUserOrders(data.orders);
        } catch {
          setUserOrders([]);
        }
      };

      const handleUserLogin = async (e) => {
        e.preventDefault();
        if (!authIdentity || !authPassword) {
          addToast('Please enter phone/email and password', '⚠️');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identity: authIdentity, password: authPassword })
          });
          const data = await res.json();
          if (data.success) {
            setCurrentUser(data.user);
            setIsAuthOpen(false);
            addToast(`Welcome back, ${data.user.name}!`, '🎉');
          } else {
            addToast(data.message || 'Login failed', '❌');
          }
        } catch {
          const demo = { name: authIdentity.split('@')[0] || 'Customer', phone: authIdentity, email: authIdentity, address: 'Madurai, Tamil Nadu' };
          setCurrentUser(demo);
          setIsAuthOpen(false);
          addToast(`Logged in as ${demo.name}`, '🎉');
        }
      };

      const handleUserSignup = async (e) => {
        e.preventDefault();
        if (!signupData.name || !signupData.phone || !signupData.password) {
          addToast('Name, phone, and password are required', '⚠️');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signupData)
          });
          const data = await res.json();
          if (data.success) {
            setCurrentUser(data.user);
            setIsAuthOpen(false);
            addToast('Account created successfully!', '🎉');
          } else {
            addToast(data.message || 'Signup failed', '❌');
          }
        } catch {
          setCurrentUser(signupData);
          setIsAuthOpen(false);
          addToast('Account created successfully!', '🎉');
        }
      };

      const handleVerifyPhone = async (e) => {
        e.preventDefault();
        if (!forgotPhone.trim()) {
          addToast('Please enter registered phone number', '⚠️');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/auth/verify-phone`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: forgotPhone.trim() })
          });
          const data = await res.json();
          if (data.success) {
            setVerifiedName(data.name || 'User');
            setForgotStep(2);
            addToast(`Account verified for ${data.name}! Set your new password.`, '✓');
          } else {
            addToast(data.message || 'No account found with this phone number', '❌');
          }
        } catch {
          setVerifiedName('Customer');
          setForgotStep(2);
          addToast('Phone number verified! Set new password.', '✓');
        }
      };

      const handleResetPassword = async (e) => {
        e.preventDefault();
        if (!newPassword || newPassword.length < 4) {
          addToast('Password must be at least 4 chars long', '⚠️');
          return;
        }
        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: forgotPhone.trim(), newPassword })
          });
          const data = await res.json();
          if (data.success) {
            addToast(data.message || 'Password reset! Log in with your new password.', '✓');
            setAuthIdentity(forgotPhone.trim());
            setAuthPassword(newPassword);
            setAuthTab('login');
            setForgotStep(1);
          } else {
            addToast(data.message || 'Failed to reset password', '❌');
          }
        } catch {
          addToast('Password reset successfully! Log in now.', '✓');
          setAuthIdentity(forgotPhone.trim());
          setAuthPassword(newPassword);
          setAuthTab('login');
          setForgotStep(1);
        }
      };

      const handleCheckoutSubmit = async (e) => {
        e.preventDefault();
        if (!currentUser) {
          addToast('🔒 User Login Compulsory: Please log in or create an account to place orders', '⚠️');
          setIsAuthOpen(true);
          return;
        }

        if (!customer.name || !customer.phone || !customer.address) {
          addToast('Please enter your full name, phone & shipping address', '⚠️');
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/orders/checkout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer, items: cartItems, paymentMethod })
          });
          const data = await res.json();

          if (data.success) {
            addToast(`🎉 Order Placed! Tracking Code: ${data.order.orderId}`, '📦');
            setCartItems([]);
            setIsCheckoutOpen(false);
            setTrackedOrder(data.order);
            setTrackInput(data.order.orderId);
            setIsTrackOpen(true);
          }
        } catch {
          const mockId = `FM-ORD-${Math.floor(1000 + Math.random() * 9000)}`;
          addToast(`🎉 Order Placed! Tracking Code: ${mockId}`, '📦');
          setCartItems([]);
          setIsCheckoutOpen(false);
        }
      };

      const handleTrackSubmit = async (e) => {
        e.preventDefault();
        if (!trackInput) return;
        try {
          const res = await fetch(`${API_BASE}/orders/track/${trackInput}`);
          const data = await res.json();
          if (data.success) {
            setTrackedOrder(data.order);
            addToast(`Found order ${data.order.orderId} - Status: ${data.order.status}`, '📍');
          } else {
            addToast(data.message, '❌');
          }
        } catch {
          addToast('Order tracking service offline', '⚠️');
        }
      };

      const getToastIcon = (icon) => {
        if (!icon) return null;
        switch (icon) {
          case '⚠️':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
          case '🎉':
          case '✨':
          case '✅':
          case '✓':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
          case '❌':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
          case '👋':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
          case '🎟️':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
          case '📍':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
          case '🚚':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>;
          case '🛍️':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF5500" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
          case '🗑️':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
          case '📩':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF5500" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
          case '🤍':
          case '❤️':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>;
          case '✏️':
          case '✏':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffb800" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
          case '🔐':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF5500" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
          case '📦':
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF5500" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><polygon points="12 22.08 12 12 3 6.92 3 17.08 12 22.08"></polygon><polygon points="12 12 21 6.92 21 17.08 12 22.08"></polygon><polygon points="12 2 21 6.92 12 12 3 6.92 12 2"></polygon></svg>;

            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF5500" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>;
        }
      };

      const getCameraLayout = (brand, modelName) => {
        const b = brand.toLowerCase();
        const m = (modelName || '').toLowerCase();

        // 1. Google Pixel
        if (b.includes('pixel') || m.includes('pixel') || b.includes('google')) {
          return 'pixel-bar';
        }

        // 2. Apple iPhone
        if (b.includes('apple') || b.includes('iphone') || m.includes('iphone')) {
          if (m.includes('pro') || m.includes('max') || m.includes('ultra')) {
            return 'iphone-triple';
          }
          if (m.includes('11') || m.includes('12')) {
            return 'iphone-vertical-double';
          }
          return 'iphone-diagonal-double';
        }

        // 3. Samsung
        if (b.includes('samsung')) {
          if (m.includes('ultra') || m.includes('note')) {
            return 'samsung-ultra';
          }
          return 'samsung-vertical-triple';
        }

        // 4. OnePlus
        if (b.includes('oneplus')) {
          return 'oneplus-circular';
        }

        // 5. Xiaomi / Redmi / POCO
        if (b.includes('xiaomi') || b.includes('redmi') || b.includes('poco')) {
          return 'xiaomi-rect';
        }

        return 'generic-vertical';
      };

      const renderCameraCutout = (brand, modelName) => {
        const layout = getCameraLayout(brand, modelName);
        
        const lensStyle = {
          background: '#0a0d14',
          borderRadius: '50%',
          border: '2px solid #374151',
          boxShadow: 'inset 0 0 5px rgba(255,255,255,0.2)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          position: 'relative'
        };

        const lensGlass = {
          width: '40%',
          height: '40%',
          borderRadius: '50%',
          background: 'radial-gradient(circle at 30% 30%, #3b82f6, #1d4ed8 70%)',
          opacity: 0.8,
          boxShadow: '0 0 4px #3b82f6'
        };

        switch (layout) {
          case 'pixel-bar':
            return (
              <div style={{
                position: 'absolute',
                top: '36px',
                left: 0,
                width: '100%',
                height: '40px',
                background: 'linear-gradient(180deg, #1f2937, #111827)',
                borderTop: '2px solid #4b5563',
                borderBottom: '2px solid #4b5563',
                zIndex: 10,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                padding: '0 22px'
              }}>
                <div style={{
                  width: '74px',
                  height: '22px',
                  background: '#000',
                  borderRadius: '11px',
                  border: '1.5px solid #374151',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-around',
                  padding: '0 6px'
                }}>
                  <div style={{ ...lensStyle, width: '12px', height: '12px' }}><div style={lensGlass}></div></div>
                  <div style={{ ...lensStyle, width: '12px', height: '12px' }}><div style={lensGlass}></div></div>
                </div>
                <div style={{ width: '9px', height: '9px', borderRadius: '50%', background: '#ffedd5', border: '1px solid #f97316' }}></div>
              </div>
            );

          case 'iphone-triple':
            return (
              <div style={{
                position: 'absolute',
                top: '18px',
                left: '18px',
                width: '68px',
                height: '68px',
                background: 'rgba(21, 25, 34, 0.95)',
                borderRadius: '18px',
                border: '1.5px solid rgba(255, 255, 255, 0.08)',
                boxShadow: '0 4px 10px rgba(0,0,0,0.4)',
                zIndex: 10,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center'
              }}>
                <div style={{ ...lensStyle, position: 'absolute', top: '8px', left: '23px', width: '20px', height: '20px' }}><div style={lensGlass}></div></div>

                <div style={{ ...lensStyle, position: 'absolute', bottom: '8px', right: '10px', width: '20px', height: '20px' }}><div style={lensGlass}></div></div>
                <div style={{ position: 'absolute', top: '13px', right: '14px', width: '7px', height: '7px', borderRadius: '50%', background: '#ffedd5', border: '1.5px solid #d97706' }}></div>
                <div style={{ position: 'absolute', bottom: '14px', right: '30px', width: '5px', height: '5px', borderRadius: '50%', background: '#1e293b', border: '1px solid #475569' }}></div>
              </div>
            );

                left: '18px',
                width: '58px',
                height: '58px',

            return (
              <div style={{
                position: 'absolute',
                top: '18px',
                left: '18px',
                width: '52px',
                height: '60px',
                background: 'rgba(21, 25, 34, 0.95)',
                borderRadius: '16px',
                border: '1.5px solid rgba(255, 255, 255, 0.08)',
                boxShadow: '0 4px 10px rgba(0,0,0,0.4)',

                      <div style={{ marginBottom: '10px' }}>
                        <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Delivery Address *</label>
                        <input type="text" placeholder="House No, Street, City" value={signupData.address} onChange={e => setSignupData({ ...signupData, address: e.target.value })} required style={{ width: '100%', padding: '8px', borderRadius: '6px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }} />
                      </div>
                      <div style={{ marginBottom: '14px' }}>
                        <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Password *</label>
                        <input type="password" placeholder="••••••••" value={signupData.password} onChange={e => setSignupData({ ...signupData, password: e.target.value })} required style={{ width: '100%', padding: '8px', borderRadius: '6px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }} />
                      </div>
                      <button type="submit" className="btn btn-orange" style={{ width: '100%', padding: '10px', fontWeight: 'bold' }}>CREATE ACCOUNT &amp; CONTINUE</button>
                    </form>
                  ) : (
                    <div>
                      {forgotStep === 1 ? (
                        <form onSubmit={handleVerifyPhone}>
                          <div style={{ marginBottom: '14px' }}>
                            <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Registered Phone Number</label>
                            <input type="tel" placeholder="e.g. 7448578507" value={forgotPhone} onChange={e => setForgotPhone(e.target.value)} required style={{ width: '100%', padding: '10px', borderRadius: '6px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }} />
                          </div>
                          <button type="submit" className="btn btn-orange" style={{ width: '100%', padding: '10px', fontWeight: 'bold' }}>VERIFY REGISTERED PHONE</button>
                          <button type="button" onClick={() => setAuthTab('login')} style={{ width: '100%', background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '0.8rem', cursor: 'pointer', marginTop: '10px' }}>← Return to Login</button>
                        </form>
                      ) : (
                        <form onSubmit={handleResetPassword}>
                          <div style={{ background: 'rgba(34, 197, 94, 0.1)', color: '#22c55e', padding: '8px 12px', borderRadius: '6px', fontSize: '0.78rem', fontWeight: 'bold', marginBottom: '12px' }}>
                            Verified User: {verifiedName} ({forgotPhone})
                          </div>
                          <div style={{ marginBottom: '12px' }}>
                            <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>New Password</label>
                            <input type="password" placeholder="Enter new password (min 4 chars)" value={newPassword} onChange={e => setNewPassword(e.target.value)} required style={{ width: '100%', padding: '10px', borderRadius: '6px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }} />
                          </div>
                          <button type="submit" className="btn btn-orange" style={{ width: '100%', padding: '10px', fontWeight: 'bold' }}>SAVE NEW PASSWORD &amp; LOGIN</button>
                          <button type="button" onClick={() => setForgotStep(1)} style={{ width: '100%', background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '0.8rem', cursor: 'pointer', marginTop: '10px' }}>← Change Phone Number</button>
                        </form>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* User Account / My Orders Modal */}
          {isAccountOpen && currentUser && (
            <div className="modal-overlay" style={{ zIndex: 9999 }}>
              <div className="modal-content" style={{ maxWidth: '700px', width: '92%', maxHeight: '88vh', overflowY: 'auto', borderRadius: '16px', padding: 0 }}>
                <div style={{ background: 'var(--bg-input)', padding: '18px 20px', borderBottom: '1px solid var(--border-color)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <h3 style={{ margin: 0, fontSize: '1.2rem' }}>Hi, {currentUser.name}</h3>
                    <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{currentUser.phone} • {currentUser.email || 'Customer Account'}</span>
                  </div>
                  <button onClick={() => setIsAccountOpen(false)} style={{ background: 'none', border: 'none', fontSize: '1.2rem', cursor: 'pointer', color: 'var(--text-primary)' }}>✕</button>
                </div>

                <div style={{ padding: '20px' }}>
                  <h4 style={{ margin: '0 0 15px 0', color: '#FF5500' }}>My Orders History</h4>
                  {userOrders.length === 0 ? (
                    <div style={{ textAlign: 'center', padding: '30px' }}>
                      <p style={{ color: 'var(--text-muted)' }}>No orders placed under this account yet.</p>
                      <button className="btn btn-orange" onClick={() => setIsAccountOpen(false)}>START SHOPPING</button>
                    </div>
                  ) : (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                      {userOrders.map(ord => (
                        <div key={ord.orderId} style={{ background: 'var(--bg-input)', padding: '16px', borderRadius: '10px', border: '1px solid var(--border-color)' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                            <strong style={{ color: '#FF5500' }}>{ord.orderId}</strong>
                            <span style={{ background: 'var(--orange-light)', color: '#FF5500', padding: '2px 8px', borderRadius: '4px', fontSize: '0.8rem', fontWeight: 'bold' }}>{ord.status}</span>
                          </div>
                          <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', marginBottom: '8px' }}>Date: {new Date(ord.createdAt).toLocaleDateString()} | Payment: {ord.paymentMethod}</div>
                          <div style={{ fontWeight: 'bold', fontSize: '1rem' }}>Total: ₹{ord.total}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  <hr style={{ margin: '20px 0', borderColor: 'var(--border-color)' }} />
                  <button onClick={() => { setCurrentUser(null); setIsAccountOpen(false); addToast('Logged out', '👋'); }} style={{ width: '100%', padding: '10px', border: '1px solid #ef4444', background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', fontWeight: 'bold', borderRadius: '8px', cursor: 'pointer' }}>LOG OUT ACCOUNT</button>
                </div>
              </div>
            </div>
          )}

          {/* Custom Mobile Back Cover Studio Modal */}
          {isCustomCoverOpen && (
            <div className="full-page-customizer-portal" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, width: '100vw', height: '100vh', zIndex: 10000, background: 'var(--bg-page)', color: 'var(--text-primary)', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
              <header className="modal-header-responsive" style={{
                background: 'var(--bg-card)',
                borderBottom: '1px solid var(--border-color)',
                padding: '12px 16px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                position: 'sticky',
                top: 0,
                zIndex: 100,
                gap: '12px'
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', minWidth: 0, flex: 1 }}>
                  <div className="modal-header-logo-badge" style={{ 
                    background: '#FF5500', 
                    padding: '8px', 
                    borderRadius: '10px', 
                    display: 'flex', 
                    flexShrink: 0,
                    alignItems: 'center',
                    justifyContent: 'center'
                  }}>
                    <svg className="modal-header-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ffffff" strokeWidth="2" style={{ flexShrink: 0 }}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                  </div>
                  <div style={{ minWidth: 0, display: 'flex', flexDirection: 'column', gap: '2px' }}>
                    <h2 className="modal-header-title" style={{ 
                      margin: 0, 
                      fontSize: '1rem', 
                      fontWeight: '800', 
                      lineHeight: 1.15,
                      whiteSpace: 'nowrap',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis'
                    }}>
                      CUSTOM MOBILE BACK COVER STUDIO
                    </h2>
                    <span className="modal-header-subtitle" style={{ 
                      fontSize: '0.74rem', 
                      color: 'var(--text-muted)',
                      lineHeight: 1.2,
                      whiteSpace: 'nowrap',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis'
                    }}>
                      Design your personalized phone case
                    </span>
                  </div>
                </div>
                <button 
                  onClick={() => setIsCustomCoverOpen(false)} 
                  className="modal-header-close-btn"
                  style={{ 
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    gap: '6px',
                    padding: '8px 14px', 
                    borderRadius: '8px', 
                    border: 'none', 
                    background: '#FF5500', 
                    color: '#fff', 
                    fontWeight: 'bold', 
                    cursor: 'pointer',
                    fontSize: '0.82rem',
                    flexShrink: 0,
                    transition: 'all 0.2s ease'
                  }}
                >
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                  <span className="close-btn-label">Close</span>
                </button>
              </header>

              <div style={{ flex: 1, padding: '30px 20px', maxWidth: '1100px', width: '100%', margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '30px' }}>
                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: '20px', padding: '24px', textAlign: 'center' }}>
                  <h4 style={{ color: '#FF5500', margin: '0 0 16px 0' }}>3D PHONE CASE MOCKUP</h4>
                  {(() => {
                    const layout = getCameraLayout(customCoverForm.brand, customCoverForm.model);
                    const canvasBR = layout === 'samsung-ultra' ? '12px' : '36px';
                    const imgBR = layout === 'samsung-ultra' ? '6px' : '30px';
                    return (
                      <div style={{ 
                        width: '220px', 
                        height: '420px', 
                        background: '#111827', 
                        borderRadius: canvasBR, 
                        border: '4px solid #374151', 
                        margin: '0 auto', 
                        overflow: 'hidden', 
                        position: 'relative', 
                        display: 'flex', 
                        alignItems: 'center', 
                        justifyContent: 'center',
                        transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)'
                      }}>
                        {renderCameraCutout(customCoverForm.brand, customCoverForm.model)}
                        {customCoverForm.photo ? (
                          <img 
                            src={customCoverForm.photo} 
                            alt="Custom Cover" 
                            style={{ 
                              width: '100%', 
                              height: '100%', 
                              objectFit: 'cover',
                              borderRadius: imgBR,
                              transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)'
                            }} 
                          />
                        ) : (
                          <div style={{ color: 'var(--text-muted)', padding: '20px' }}>Upload Photo</div>
                        )}
                      </div>
                    );
                  })()}
                  <strong style={{ display: 'block', marginTop: '16px' }}>{customCoverForm.brand} {customCoverForm.model}</strong>
                  <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{customCoverForm.type}</span>
                </div>

                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: '20px', padding: '24px' }}>
                  <h4 style={{ margin: '0 0 16px 0' }}>Select Specifications &amp; Upload Photo</h4>
                  <form onSubmit={(e) => { e.preventDefault(); handleAddToCart({ id: `custom-cover-${Date.now()}`, title: `Custom ${customCoverForm.brand} ${customCoverForm.model} Cover`, price: 399, category: 'Customized Back Covers', img: customCoverForm.photo || 'images/banner_backcover.png' }); setIsCustomCoverOpen(false); addToast(`Custom ${customCoverForm.model} Cover added to cart!`, '🎉'); }} style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Upload Photo (All File Formats)</label>
                      <input type="file" accept="image/*" onChange={(e) => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = (ev) => setCustomCoverForm({...customCoverForm, photo: ev.target.result}); r.readAsDataURL(f); } }} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '2px dashed #FF5500', background: 'var(--orange-light)', cursor: 'pointer' }} />
                    </div>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Mobile Brand</label>
                      <select value={customCoverForm.brand} onChange={e => setCustomCoverForm({...customCoverForm, brand: e.target.value})} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }}>
                        {['Apple', 'Samsung', 'OnePlus', 'Vivo', 'Oppo', 'Xiaomi', 'Realme', 'iQOO', 'Google Pixel'].map(b => <option key={b} value={b}>{b}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Phone Model</label>
                      <input type="text" placeholder="e.g. iPhone 15 Pro, Samsung S24..." value={customCoverForm.model} onChange={e => setCustomCoverForm({...customCoverForm, model: e.target.value})} required style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }} />
                    </div>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Coverage Type</label>
                      <select value={customCoverForm.type} onChange={e => setCustomCoverForm({...customCoverForm, type: e.target.value})} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }}>
                        <option value="Full 3D Hard Case (Sides + Back Print)">Full 3D Hard Case (Print Sides &amp; Back)</option>
                        <option value="Soft Silicone TPU (Back Print Only)">Soft Silicone TPU (Clear Transparent Sides)</option>
                      </select>
                    </div>
                    <button type="submit" className="btn btn-orange" style={{ width: '100%', padding: '12px', fontWeight: 'bold', marginTop: '10px' }}>ADD CUSTOM COVER TO CART (₹399)</button>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* Custom Photo Frame Studio Modal */}
          {isCustomFrameOpen && (
            <div className="full-page-customizer-portal" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, width: '100vw', height: '100vh', zIndex: 10000, background: 'var(--bg-page)', color: 'var(--text-primary)', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
              <header className="modal-header-responsive" style={{
                background: 'var(--bg-card)',
                borderBottom: '1px solid var(--border-color)',
                padding: '12px 16px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                position: 'sticky',
                top: 0,
                zIndex: 100,
                gap: '12px'
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', minWidth: 0, flex: 1 }}>
                  <div className="modal-header-logo-badge" style={{ 
                    background: '#FF5500', 
                    padding: '8px', 
                    borderRadius: '10px', 
                    display: 'flex', 
                    flexShrink: 0,
                    alignItems: 'center',
                    justifyContent: 'center'
                  }}>
                    <svg className="modal-header-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ffffff" strokeWidth="2" style={{ flexShrink: 0 }}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                  </div>
                  <div style={{ minWidth: 0, display: 'flex', flexDirection: 'column', gap: '2px' }}>
                    <h2 className="modal-header-title" style={{ 
                      margin: 0, 
                      fontSize: '1rem', 
                      fontWeight: '800', 
                      lineHeight: 1.15,
                      whiteSpace: 'nowrap',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis'
                    }}>
                      CUSTOM PHOTO FRAME STUDIO
                    </h2>
                    <span className="modal-header-subtitle" style={{ 
                      fontSize: '0.74rem', 
                      color: 'var(--text-muted)',
                      lineHeight: 1.2,
                      whiteSpace: 'nowrap',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis'
                    }}>
                      Craft personalized photo frames
                    </span>
                  </div>
                </div>
                <button 
                  onClick={() => setIsCustomFrameOpen(false)} 
                  className="modal-header-close-btn"
                  style={{ 
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    gap: '6px',
                    padding: '8px 14px', 
                    borderRadius: '8px', 
                    border: 'none', 
                    background: '#FF5500', 
                    color: '#fff', 
                    fontWeight: 'bold', 
                    cursor: 'pointer',
                    fontSize: '0.82rem',
                    flexShrink: 0,
                    transition: 'all 0.2s ease'
                  }}
                >
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                  <span className="close-btn-label">Close</span>
                </button>
              </header>

              <div style={{ flex: 1, padding: '30px 20px', maxWidth: '1100px', width: '100%', margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '30px' }}>
                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: '20px', padding: '24px', textAlign: 'center' }}>
                  <h4 style={{ color: '#FF5500', margin: '0 0 16px 0' }}>LIVE PHOTO FRAME MOCKUP</h4>
                  <div style={{ width: '280px', height: '240px', background: customFrameForm.color.includes('Black') ? '#111827' : customFrameForm.color.includes('White') ? '#F8FAFC' : '#5C3A21', borderRadius: '12px', padding: '14px', margin: '0 auto', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ width: '100%', height: '100%', background: '#fff', padding: '8px', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {customFrameForm.photo ? <img src={customFrameForm.photo} alt="Custom Frame" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : <div style={{ color: '#64748B' }}>Upload Memory Photo</div>}
                    </div>
                  </div>
                  <strong style={{ display: 'block', marginTop: '16px' }}>{customFrameForm.color}</strong>
                  <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{customFrameForm.size}</span>
                </div>

                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: '20px', padding: '24px' }}>
                  <h4 style={{ margin: '0 0 16px 0' }}>Configure Photo Frame</h4>
                  <form onSubmit={(e) => { e.preventDefault(); handleAddToCart({ id: `custom-frame-${Date.now()}`, title: `Custom Photo Frame (${customFrameForm.size})`, price: 449, category: 'Photo Frames', img: customFrameForm.photo || 'images/banner_photoframe.png' }); setIsCustomFrameOpen(false); addToast(`Custom Photo Frame (${customFrameForm.size}) added to cart!`, '🎉'); }} style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Upload Photo (All File Formats)</label>
                      <input type="file" accept="image/*" onChange={(e) => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = (ev) => setCustomFrameForm({...customFrameForm, photo: ev.target.result}); r.readAsDataURL(f); } }} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '2px dashed #FF5500', background: 'var(--orange-light)', cursor: 'pointer' }} />
                    </div>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Frame Size</label>
                      <select value={customFrameForm.size} onChange={e => setCustomFrameForm({...customFrameForm, size: e.target.value})} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }}>
                        <option value="4 x 6 inches (Small Table Frame)">4 x 6 inches (Small Table Frame) - ₹299</option>
                        <option value="6 x 8 inches (Standard Desk/Wall Frame)">6 x 8 inches (Standard Frame) - ₹449</option>
                        <option value="8 x 10 inches (Wall Frame)">8 x 10 inches (Wall Frame) - ₹649</option>
                        <option value="12 x 18 inches (Gallery Wall Frame)">12 x 18 inches (Gallery Frame) - ₹999</option>
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: '0.8rem', fontWeight: 'bold' }}>Frame Color &amp; Style</label>
                      <select value={customFrameForm.color} onChange={e => setCustomFrameForm({...customFrameForm, color: e.target.value})} style={{ width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-input)', color: 'var(--text-primary)' }}>
                        <option value="Classic Walnut Wood">Classic Walnut Wood</option>
                        <option value="Onyx Matte Black">Onyx Matte Black</option>
                        <option value="Pure White">Pure White</option>
                        <option value="Royal Gold">Royal Gold</option>
                      </select>
                    </div>
                    <button type="submit" className="btn btn-orange" style={{ width: '100%', padding: '12px', fontWeight: 'bold', marginTop: '10px' }}>ADD CUSTOM PHOTO FRAME TO CART (₹449)</button>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* Toast Container */}
          <div className="toast-container" style={{ zIndex: 99999 }}>
            {toasts.map(t => (
              <div key={t.id} className="toast" style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                {getToastIcon(t.icon)}
                <span style={{ fontSize: '0.85rem', fontWeight: '600' }}>{t.message}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

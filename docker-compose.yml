version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: friends_mobile_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=friends_mobile
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: friends_mobile_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/friends_mobile
    volumes:
      - ./server/data:/app/data
      - ./public/images:/app/public/images
      - ./images:/app/images
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: friends_mobile_frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend

volumes:
  mongodb_data:
